name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:resolute
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -q
          apt-get install -y build-essential cmake libpqxx-dev nlohmann-json3-dev pkg-config

      - name: Build
        working-directory: cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build --target pg_licht_mcp
          strip build/pg_licht_mcp

      - name: Package
        run: tar -czf pg_licht_mcp-linux-x86_64.tar.gz -C cpp/build pg_licht_mcp

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: pg_licht_mcp-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install libpq libpqxx nlohmann-json pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build
        working-directory: cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"
          cmake --build build --target pg_licht_mcp
          strip build/pg_licht_mcp

      - name: Package
        run: tar -czf pg_licht_mcp-macos-arm64.tar.gz -C cpp/build pg_licht_mcp

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: pg_licht_mcp-macos-arm64.tar.gz

  build-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and pack
        working-directory: typescript
        run: |
          npm ci
          npm version ${GITHUB_REF_NAME#v} --no-git-tag-version --allow-same-version
          npm run build
          npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: typescript
          path: typescript/pg-licht-mcp-*.tgz

  release:
    needs: [build-linux, build-macos, build-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "pg_licht_mcp ${{ github.ref_name }}" \
            --generate-notes \
            pg_licht_mcp-linux-x86_64.tar.gz \
            pg_licht_mcp-macos-arm64.tar.gz \
            pg-licht-mcp-*.tgz
        env:
          GH_TOKEN: ${{ github.token }}
